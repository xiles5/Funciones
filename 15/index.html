<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
@import "tailwindcss";

@layer base {

  body {
    @apply mx-auto w-full max-w-4xl px-4 md:px-6 text-center bg-cyan-900 mt-10 md:mt-20 lg:mt-40 text-white;
  }

  h1 {
    @apply text-3xl md:text-5xl font-bold mb-6 text-center;
  }

  input {
    @apply border w-full md:w-auto p-2 rounded;
  }

  h2 {
    @apply text-xl md:text-2xl text-center mb-8;
  }

  img {
    @apply w-full max-w-md h-auto object-cover rounded-xl border-4 border-white shadow-lg;
  }

  button {
    @apply mt-4 mb-4 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg shadow transition w-full md:w-auto;
  }

  p {
    @apply text-base md:text-lg mb-2;
  }

  a {
    @apply block hover:bg-cyan-800 hover:p-2 rounded-md transition;
  }

  summary {
    @apply bg-white text-black rounded-lg p-3 cursor-pointer font-bold;
  }

  div {
    @apply bg-black p-4 md:p-8 lg:p-10 rounded-3xl flex flex-col;
  }

  details {
    @apply mb-4;
  }

}

@layer components {

  .card {
    @apply border border-cyan-700 rounded-2xl p-4 md:p-6 w-full;
  }

  .contenedor {
    @apply flex flex-col lg:flex-row gap-6 bg-black rounded-2xl p-4 md:p-10 w-full max-w-7xl mx-auto;
  }

}

@layer utilities {

  .rotate-45-extra {
    transform: rotate(45deg);
  }

}

</style>
</head>
<body>
    <body>
<div>
    <label for="cadena">Introduce un email:</label>
    <input type="text" id="cadena">

    <button type="button" id="apretar">Resultado</button>

    <p id="resultado"></p>
</div>

<script>
const APRETAR = document.getElementById("apretar");
const CADENA = document.getElementById("cadena");
const RESULTADO = document.getElementById("resultado");

const miFuncion = (cadena) => {

    let arroba = -1;
    let punto = -1;
    let contadorArrobas = 0;

    for(let i = 0; i < cadena.length; i++){

        if(cadena[i] === "@"){
            contadorArrobas++;
            arroba = i;
        }

        if(cadena[i] === "."){
            punto = i;
        }
    }

    if(contadorArrobas !== 1){
        return false;
    }

    if(arroba <= 0){
        return false;
    }

    if(punto <= arroba + 1){
        return false;
    }

    if(punto >= cadena.length - 2){
        return false;
    }

    return true;
};

const main = () => {

    let texto = CADENA.value;

    let res = miFuncion(texto);

    RESULTADO.innerHTML =
        "¿Es un email válido? " + res;
};

APRETAR.addEventListener("click", main);
</script>
</body>
</body>
</html>
