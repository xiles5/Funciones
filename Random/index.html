<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación por pares</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
     <style type="text/tailwindcss">
@import "tailwindcss";

@layer base {

  body {
    @apply mx-auto w-full max-w-4xl px-4 md:px-6 text-center bg-cyan-900 mt-10 md:mt-20 lg:mt-40 text-white;
  }

  h1 {
    @apply text-3xl md:text-5xl font-bold mb-6 text-center;
  }

  input {
    @apply border w-full md:w-auto p-2 rounded;
  }

  h2 {
    @apply text-xl md:text-2xl text-center mb-8;
  }

  img {
    @apply w-full max-w-md h-auto object-cover rounded-xl border-4 border-white shadow-lg;
  }

  button {
    @apply mt-4 mb-4 bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg shadow transition w-full md:w-auto;
  }

  p {
    @apply text-base md:text-lg mb-2;
  }

  a {
    @apply block hover:bg-cyan-800 hover:p-2 rounded-md transition;
  }

  summary {
    @apply bg-white text-black rounded-lg p-3 cursor-pointer font-bold;
  }

  div {
    @apply bg-black p-4 md:p-8 lg:p-10 rounded-3xl flex flex-col;
  }

  details {
    @apply mb-4;
  }

}

@layer components {

  .card {
    @apply border border-cyan-700 rounded-2xl p-4 md:p-6 w-full;
  }

  .contenedor {
    @apply flex flex-col lg:flex-row gap-6 bg-black rounded-2xl p-4 md:p-10 w-full max-w-7xl mx-auto;
  }

}

@layer utilities {

  .rotate-45-extra {
    transform: rotate(45deg);
  }

}

</style>
</head>
<body>

<button id="apretar">Generar Revisiones</button>

<div id="resultado"></div>

<script>
class Evaluadores {
    constructor(revisor, revisado, repositorio) {
        this.revisor = revisor;
        this.revisado = revisado;
        this.repositorio = repositorio;
    }
}

const integrantes = [
    { nombre: "Aya", repositorio: "https://github.com/ayaelo9" },
    { nombre: "Cristian", repositorio: "https://github.com/xiles5" },
    { nombre: "Cyrille", repositorio: "https://github.com/cyrille514" },
    { nombre: "David", repositorio: "https://github.com/dayvip369" },
    { nombre: "Guillermo", repositorio: "https://github.com/codeguille98" },
    { nombre: "Jenifer", repositorio: "https://github.com/jenifer-al" },
    { nombre: "Joelle", repositorio: "https://github.com/moussijoelle" },
    { nombre: "Maximiliam", repositorio: "https://github.com/mx-2-d" },
    { nombre: "Mohammed", repositorio: "https://github.com/MohammedZakhbat" },
    { nombre: "Naomi", repositorio: "https://github.com/naomiquitosalazar-cyber" },
    { nombre: "Natalia", repositorio: "https://github.com/nataliya-stack" },
    { nombre: "Yolanda", repositorio: "https://github.com/fontanillus" },
    { nombre: "Yordano", repositorio: "https://github.com/yordano108" }
];

const APRETAR = document.getElementById("apretar");
const RESULTADO = document.getElementById("resultado");

const generarRevisiones = () => {

    let revisiones = [];

    // Crear objetos con el revisor
    for (let i = 0; i < integrantes.length; i++) {
        revisiones.push(
            new Evaluadores(
                integrantes[i].nombre,
                "",
                ""
            )
        );
    }

    // Crear lista de índices
    let indices = [];

    for (let i = 0; i < integrantes.length; i++) {
        indices.push(i);
    }

    // Mezclar hasta que nadie se revise a sí mismo
    let valido = false;

    while (!valido) {

        indices.sort(() => Math.random() - 0.5);

        valido = true;

        for (let i = 0; i < integrantes.length; i++) {
            if (i === indices[i]) {
                valido = false;
                break;
            }
        }
    }

    // Asignar revisado y repositorio
    for (let i = 0; i < revisiones.length; i++) {
        revisiones[i].revisado = integrantes[indices[i]].nombre;
        revisiones[i].repositorio = integrantes[indices[i]].repositorio;
    }

    // Mostrar resultados
    let salida = "<h2>Evaluaciones</h2>";

    for (const revision of revisiones) {
        salida += `
            <p>
                <strong>${revision.revisor}</strong>
                revisará a
                <strong>${revision.revisado}</strong><br>
                Repositorio:
                <a href="${revision.repositorio}" target="_blank">
                    ${revision.repositorio}
                </a>
            </p>
        `;
    }

    RESULTADO.innerHTML = salida;
};

APRETAR.addEventListener("click", generarRevisiones);
</script>

</body>
</html>
